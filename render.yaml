services:
  - type: web
    name: visual-lab-pro-api
    env: node
    plan: starter
    buildCommand: npm install --production
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: API_SECRET
        generateValue: true
      - key: KIMI_API_KEY
        sync: false
      - key: DATABASE_PATH
        value: /tmp/visual-lab.db
    disk:
      name: visual-lab-data
      mountPath: /tmp
      sizeGB: 1
